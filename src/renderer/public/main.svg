<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <!-- Core Glow -->
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0"/>
    </radialGradient>
    <!-- Agent Node Gradients -->
    <linearGradient id="agent1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#0369A1"/>
    </linearGradient>
    <linearGradient id="agent2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#4338CA"/>
    </linearGradient>
    <linearGradient id="agent3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34D399"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
  </defs>

  <!-- macOS Style Squircle Base Container -->
  <rect x="32" y="32" width="448" height="448" rx="100" fill="url(#bgGrad)" stroke="#334155" stroke-width="4"/>

  <!-- Network Interconnection Paths -->
  <g stroke="#475569" stroke-width="4" stroke-dasharray="8 4">
    <line x1="256" y1="140" x2="150" y2="320" />
    <line x1="256" y1="140" x2="362" y2="320" />
    <line x1="150" y1="320" x2="362" y2="320" />
  </g>

  <!-- Central Orchestrator / Core Glow -->
  <circle cx="256" cy="256" r="120" fill="url(#coreGlow)" />

  <!-- Communication Rings -->
  <circle cx="256" cy="256" r="60" fill="none" stroke="#64748B" stroke-width="2" stroke-dasharray="4 4"/>

  <!-- Active Agent 1 (Top Orchestrator) -->
  <circle cx="256" cy="140" r="36" fill="url(#agent1)" filter="drop-shadow(0px 4px 10px rgba(56,189,248,0.5))"/>
  <circle cx="256" cy="140" r="12" fill="#FFFFFF"/>

  <!-- Active Agent 2 (Bottom Left) -->
  <circle cx="150" y="320" r="36" fill="url(#agent2)" filter="drop-shadow(0px 4px 10px rgba(129,140,248,0.5))"/>
  <circle cx="150" y="320" r="12" fill="#FFFFFF"/>

  <!-- Active Agent 3 (Bottom Right) -->
  <circle cx="362" y="320" r="36" fill="url(#agent3)" filter="drop-shadow(0px 4px 10px rgba(52,211,153,0.5))"/>
  <circle cx="362" y="320" r="12" fill="#FFFFFF"/>

  <!-- Data Packets (In-flight collaboration dots) -->
  <circle cx="203" cy="230" r="6" fill="#38BDF8" />
  <circle cx="309" cy="230" r="6" fill="#34D399" />
  <circle cx="256" cy="320" r="6" fill="#818CF8" />
</svg>
